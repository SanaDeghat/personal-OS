<!DOCTYPE html>
<html>
<head>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
        <filter id="crayon">
            <!-- This creates the rough, grainy noise -->
            <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="4" result="noise" />
            <!-- This applies the noise to the border, distorting it to look like wax/chalk -->
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>
    <div id="topMenu">
        <div style="display: flex; gap: 16px; margin-left: 16px; align-items: center;">
            <span style="font-weight: 800; font-size: 16px;"></span>
            <span style="font-weight: 600;">Sanas OS</span>
            <span>File</span>
            <span>Edit</span>
            <span>View</span>
            <span>Window</span>
            <span>Help</span>
        </div>
        <p id="timeElement">
            25:61
        </p>
    </div>

    <div class="desktop-app" onclick="handleIconTap(this)" data-window="notesWindow">
        <div class="app-icon-container">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmi8xobwEdy58MmnKQsnDV_WERBrvv73mcNw&s" class="app-icon">
            <p class="app-name">Notes</p>
        </div>
    </div>

   

</body>
</html>
