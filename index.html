<!DOCTYPE html>
<html>
<head>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <script async defer src="https://apis.google.com/js/api.js"></script>
<script async defer src="https://accounts.google.com/gsi/client"></script>
</head>
<body>
     <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
        <filter id="crayon">
            <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="4" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>
    <div id="topMenu">
        <div style="display: flex; gap: 16px; margin-left: 16px; align-items: center;">
            <span style="font-weight: 800; font-size: 16px;"></span>
            <span style="font-weight: 600;">Sanas OS</span>
            <span>File</span>
            <span>Edit</span>
            <span>View</span>
            <span>Window</span>
            <span>Help</span>
        </div>
        <p id="timeElement">
            25:61
        </p>
    </div>

   
   

    <div id="dock" aria-label="Application Dock">
        <div class="dock-inner">
            <button class="dock-app" data-window="mailWindow" aria-label="Mail" type="button">
                <img src="icons/mail.png" class="dock-icon" alt="Mail App">
                <span class="dock-indicator"></span>
            </button>
            <button class="dock-app" data-window="musicWindow" aria-label="Music" type="button">
                <img src="icons/music.png" class="dock-icon" alt="Music">
                <span class="dock-indicator"></span>
            </button>
            <button class="dock-app" data-window="notesWindow" aria-label="Notes" type="button">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmi8xobwEdy58MmnKQsnDV_WERBrvv73mcNw&s" class="dock-icon" alt="Notes">
                <span class="dock-indicator"></span>
            </button>
            <button class="dock-app" data-window="photosWindow" aria-label="Photos" type="button">
                <img src="icons/photos.png" class="dock-icon" alt="Photos">
                <span class="dock-indicator"></span>
            </button>
        </div>
    </div>

</body>
</html>
